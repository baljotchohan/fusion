name: Sync to Hugging Face
on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Prepend Hugging Face Metadata
        run: |
          # Create a temporary file with the required Hugging Face frontmatter
          cat << 'EOF' > README.tmp
          ---
          title: Fusion
          emoji: ⚡
          colorFrom: purple
          colorTo: blue
          sdk: docker
          pinned: false
          ---

          EOF
          # Append the original clean README.md
          cat README.md >> README.tmp
          # Overwrite README.md with the temporary file
          mv README.tmp README.md

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add README.md
          git commit -m "build: inject Hugging Face Space metadata"
          git push -f https://baljot07:$HF_TOKEN@huggingface.co/spaces/baljot07/fusion HEAD:main
