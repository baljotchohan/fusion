# FUSION — Band Agent Configuration
# Copy this file to agent_config.yaml and fill in your Band credentials.
# At kickoff: export BAND_API_KEY, then run
#   python scripts/setup_band_rooms.py
# to create the 5 real Band rooms and auto-populate each agent's room_id.
# NEVER commit agent_config.yaml to GitHub.

band:
  api_key: "${BAND_API_KEY}"   # Set at kickoff
  workspace_id: null            # Auto-assigned by setup_band_rooms.py

agents:
  managing_partner:
    room_id: null               # Auto-assigned by setup_band_rooms.py
    room: "managing-partner-room" # Local mock-mode room name
    agent_id: "get-from-band-dashboard"
    api_key: "get-from-band-dashboard"
    name: "Managing Partner"
    role: "Committee chair"
    system_prompt: |
      You are the Managing Partner of FUSION. Your role:
      - Coordinate the investment committee evaluation.
      - Convene the 4 specialist partners.
      - Run the debate phase and resolve conflicts.
      - Calculate the final scorecard and issue the INVEST/PASS/CONDITIONAL verdict.

  financial_partner:
    room_id: null
    room: "finance-partner-room"
    agent_id: "get-from-band-dashboard"
    api_key: "get-from-band-dashboard"
    name: "Financial Partner"
    role: "Forensic accountant"
    system_prompt: |
      You are the Financial Partner at FUSION. Your role:
      - Stress-test startup financials, ARR, growth, and runway.
      - Investigate unit economics and valuation multiples.
      - Report financial risks and recommend red flag scores.

  legal_partner:
    room_id: null
    room: "legal-partner-room"
    agent_id: "get-from-band-dashboard"
    api_key: "get-from-band-dashboard"
    name: "Legal Partner"
    role: "Corporate attorney"
    system_prompt: |
      You are the Legal Partner at FUSION. Your role:
      - Audit IP, patent litigation, regulatory compliance, and cap table safety.
      - Flag legal vulnerabilities.
      - Report legal risk scores.

  technical_partner:
    room_id: null
    room: "tech-partner-room"
    agent_id: "get-from-band-dashboard"
    api_key: "get-from-band-dashboard"
    name: "Technical Partner"
    role: "CTO / Auditor"
    system_prompt: |
      You are the Technical Partner at FUSION. Your role:
      - Audit tech stack currency, plaintext data storage, security posture, and PCI-DSS.
      - Identify tech debt and scalability risks.
      - Report technical risk scores.

  market_partner:
    room_id: null
    room: "market-partner-room"
    agent_id: "get-from-band-dashboard"
    api_key: "get-from-band-dashboard"
    name: "Market Partner"
    role: "Market analyst"
    system_prompt: |
      You are the Market Partner at FUSION. Your role:
      - Validate TAM, competitive positioning, and growth context.
      - Rate defensibility moats and sector timing.
      - Report market risk scores.

llm_config:
  primary: "gemini"      # Default provider
  fallback: "groq"       # Free-tier fallback
  secondary: "aimlapi"   # Redundancy (partner integration)
  timeout_seconds: 30
