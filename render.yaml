services:
  - type: web
    name: argus-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PORT
        value: 8000
      - key: BAND_MOCK
        value: "true"
      - key: GOOGLE_API_KEY
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
