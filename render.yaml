services:
  - type: web
    name: argus-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PORT
        value: 8000
      - key: BAND_MOCK
        value: "true"
      # AIML API — conversational chat (core/llm_router.py)
      - key: AIMLAPI_KEY
        sync: false
      - key: ARGUS_LLM_PRIMARY
        value: aimlapi
      # Featherless (native API) — due-diligence analysis agents (core/base_agent.py).
      # FEATHERLESS_API_KEY is a native rc_ key. (For an hf_ token instead, set
      # ARGUS_FEATHERLESS_BASE_URL to https://router.huggingface.co/featherless-ai/v1)
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: ARGUS_FEATHERLESS_BASE_URL
        value: https://api.featherless.ai/v1
      - key: ARGUS_FEATHERLESS_MODEL
        value: Qwen/Qwen2.5-72B-Instruct
